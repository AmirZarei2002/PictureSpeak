# nginx server for the PictureSpeak Flutter Web bundle.
#
# - Serves the SPA at /, falling back to /index.html for client-side routes.
# - Reverse-proxies /api/ and /static/ to the backend so the browser sees a
#   single origin (no CORS dance needed).
# - The `backend` host is resolved via Docker's embedded DNS (compose service
#   name). Inside the network the backend listens on :3000.

upstream picturespeak_backend {
    server backend:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't cache the bootstrap shell — Flutter Web regenerates its bundle
    # hashes on every build and the shell points at them by name.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Hashed assets (main.dart.js, canvaskit/*, assets/*) are content-addressed
    # — safe to cache aggressively.
    location ~* \.(?:js|css|wasm|ttf|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # API + uploaded media — proxied to the NestJS backend.
    location /api/ {
        proxy_pass         http://picturespeak_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        # Uploads can be large (audio + images); give them headroom.
        client_max_body_size 32m;
        proxy_read_timeout 60s;
    }

    location /static/ {
        proxy_pass         http://picturespeak_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    # SPA fallback — Flutter handles routing client-side via go_router.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
